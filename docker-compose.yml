services:
  asset-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asset-manager
    expose:
      - "5000"
    volumes:
      - asset-data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy-ssl-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    command: caddy reverse-proxy --from assets.josh-green.uk --to asset-manager:5000

volumes:
  asset-data:
  caddy_data:
  caddy_config:
